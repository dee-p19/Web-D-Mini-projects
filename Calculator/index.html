<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
        <button class="gray" onclick="clearAll()">AC</button>  <!--we'll use class in css(for styling) and onclick in js for adding functionality -->
        <button class="gray" onclick="toggleSign()">+/-</button>
        <button class="gray" onclick="percentage()">%</button>
        <button class="orange" onclick="setOperator('/')">÷</button>

        <button onclick="addNumber('7')">7</button>
        <button onclick="addNumber('8')">8</button>
        <button onclick="addNumber('9')">9</button>
        <button class="orange" onclick="setOperator('*')">×</button>

        <button onclick="addNumber('4')">4</button>
        <button onclick="addNumber('5')">5</button>
        <button onclick="addNumber('6')">6</button>
        <button class="orange" onclick="setOperator('-')">−</button>

        <button onclick="addNumber('1')">1</button>
        <button onclick="addNumber('2')">2</button>
        <button onclick="addNumber('3')">3</button>
        <button class="orange" onclick="setOperator('+')">+</button>

        <button class="zero" onclick="addNumber('0')">0</button>
        <button onclick="addNumber('.')">.</button>
        <button class="orange" onclick="calculate()">=</button>
    </div>
</div>

<script src="script.js"></script> 
</body>
</html>
